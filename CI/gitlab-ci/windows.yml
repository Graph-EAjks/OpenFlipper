VS2015-Qt-5.10.1-x64:
  stage: Build
  script: "CI\\ci-windows-build.bat"
  variables:
    GIT_SUBMODULE_STRATEGY: recursive
    ARCHITECTURE: "x64"
    QT_VERSION: "Qt5.10.1"
    COMPILER: "VS2015"
  tags:
    - VS2015
    - Qt5101
  artifacts:
    expire_in: 1 week
    paths:
      - artifacts

