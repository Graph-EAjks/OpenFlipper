#-----------  Job Informations:
# Type:       Test
# OS:         Apple
# QT Tag:     {{QT_TAG}}
# Language:   {{LANGUAGE}}

Test:Mac-{{LANGUAGE}}:
    stage: Test
    script: "artifacts/CI/ci-mac-test.sh"
    variables:
      LANGUAGE: "{{LANGUAGE}}"
      GIT_STRATEGY: none
    tags:
      - Apple
      - {{QT_TAG}}
    dependencies:
      - Mac-{{LANGUAGE}}
    needs: [Mac-{{LANGUAGE}}]
    artifacts:
      paths:
        - build-release/Testing/Temporary/LastTest.log

#
#-----------
