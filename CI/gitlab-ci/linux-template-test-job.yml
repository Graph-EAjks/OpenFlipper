#-----------  Job Informations:
# Type:       Test: {{BUILDTYPE}}
# OS:         Linux
# Compiler:   {{COMPILER}}
# Language:   {{LANGUAGE}}
# QT Version: {{QT_VERSION}}

test-{{BUILDTYPE}}-{{COMPILER}}-{{LANGUAGE}}-{{QT_VERSION}}:
  stage: Test
  image: graphics.rwth-aachen.de:4567/docker/docker/docker-openflipper-container
  variables:
    COMPILER: "{{COMPILER}}"
    LANGUAGE:  "{{LANGUAGE}}"
    QTVERSION: "{{QT_VERSION}}"
    BUILDTYPE: "{{BUILDTYPE}}"
  script: "CI/ci-linux-test.sh"
  tags:
    - Docker
  dependencies: [build-{{BUILDTYPE}}-{{COMPILER}}-{{LANGUAGE}}-{{QT_VERSION}}]
  needs: [build-{{BUILDTYPE}}-{{COMPILER}}-{{LANGUAGE}}-{{QT_VERSION}}]
  artifacts:
    paths:
       - build-{{BUILDTYPE}}-{{COMPILER}}-{{LANGUAGE}}-{{QT_VERSION}}/Testing/Temporary/LastTest.log   
  
test-{{BUILDTYPE}}-{{COMPILER}}-{{LANGUAGE}}-{{QT_VERSION}}-nopython:
  stage: Test
  image: graphics.rwth-aachen.de:4567/docker/docker/docker-openflipper-container
  variables:
    COMPILER: "{{COMPILER}}"
    LANGUAGE: "{{LANGUAGE}}"
    QTVERSION: "{{QT_VERSION}}"
    BUILDTYPE: "{{BUILDTYPE}}"
    PYTHON: "no" 
  script: "CI/ci-linux-test.sh"
  tags:
    - Docker
  dependencies: [build-{{BUILDTYPE}}-{{COMPILER}}-{{LANGUAGE}}-{{QT_VERSION}}-nopython]
  needs: [build-{{BUILDTYPE}}-{{COMPILER}}-{{LANGUAGE}}-{{QT_VERSION}}-nopython]
  artifacts:
    paths:
       - build-{{BUILDTYPE}}-{{COMPILER}}-{{LANGUAGE}}-{{QT_VERSION}}/Testing/Temporary/LastTest.log

