Test:VS2015-Qt-5.10.1-x64:
  stage: Test
  script: "artifacts\\CI\\ci-windows-bootstrap.bat"
  variables:
    GIT_STRATEGY: none
    ARCHITECTURE: "x64"
    QT_VERSION: "Qt5.10.1"
    COMPILER: "VS2015"
    STAGE2SCRIPT: ci-windows-test.bat
  tags:
    - VS2015
    - Qt5101
  dependencies:
    - VS2015-Qt-5.10.1-x64
  needs: [VS2015-Qt-5.10.1-x64]
  artifacts:
    paths:
      - rel/Testing/Temporary/LastTest.log

