stages:
  - Build
  - Test
  - Deploy

variables:
  GET_SOURCES_ATTEMPTS: 3
  CTEST_OUTPUT_ON_FAILURE: 1

  
  
gcc-c++11-Qt5.12.2:
  stage: Build
  variables:     
    COMPILER:       "gcc"     
    LANGUAGE:       "C++11"     
    QTVERSION:      "QT5.12.2"     
    GIT_SUBMODULE_STRATEGY: recursive
  script: "CI/ci-linux-build.sh"
  tags:
    - Linux
    - stretch
  artifacts:
    expire_in: 1 week
    paths:
       - artifacts
       
test-gcc-c++11-Qt5.12.2:
  stage: Test
  variables:     
    COMPILER:       "gcc"     
    LANGUAGE:       "C++11"     
    QTVERSION:      "QT5.12.2"     
    GIT_STRATEGY: none
  script: "artifacts/CI/ci-linux-test.sh"
  tags:
    - Linux
    - stretch
  dependencies:
    - gcc-c++11-Qt5.12.2
  needs: [gcc-c++11-Qt5.12.2]
  artifacts:
    paths:
       - build-Release-gcc-cpp11-qt5/Testing/Temporary/LastTest.log    
       
       
