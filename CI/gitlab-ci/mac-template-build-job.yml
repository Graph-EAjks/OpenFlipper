#-----------  Job Informations:
# Type:       Build
# OS:         Apple
# QT Tag:     {{QT_TAG}}
# Language:   {{LANGUAGE}}

Mac-{{LANGUAGE}}:
  stage: Build
  variables:
    LANGUAGE: "{{LANGUAGE}}"
    GIT_SUBMODULE_STRATEGY: recursive
  script: "CI/ci-mac-build.sh"
  tags:
    - Apple
    - {{QT_TAG}}
  artifacts:
    expire_in: 1 week
    paths:
      - artifacts
#
#-----------
